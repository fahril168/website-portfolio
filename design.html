<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/css/styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Portfolio</title>
    <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* ── LOADING STATE ── */
        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            gap: 1rem;
            color: #aaa;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid hsl(224, 89%, 90%);
            border-top-color: hsl(224, 89%, 60%);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── EMPTY STATE ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            gap: .75rem;
            color: #bbb;
            font-size: .9rem;
        }
        .empty-state i {
            font-size: 3rem;
            color: hsl(224, 89%, 80%);
        }

        /* ── ERROR STATE ── */
        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            gap: .5rem;
            color: #ef4444;
            font-size: .85rem;
            text-align: center;
        }
        .error-state i { font-size: 2.5rem; }

        /* ── YEAR SECTION HIDDEN INITIALLY ── */
        .year-section { display: none; }
        .year-section.visible { display: block; }
    </style>
</head>
<body>
    <a href="index.html" class="back-button"><i class="bx bx-left-arrow-alt"></i> Back</a>
    <section class="design-section">
        <h1 class="design-title">Design Portfolio</h1>

        <!-- Dynamic content rendered here -->
        <div id="design-content">
            <div style="margin-top:80px">
                <div class="loading-wrap">
                    <div class="spinner"></div>
                    <span>Memuat portfolio...</span>
                </div>
            </div>
        </div>
    </section>

    <!-- MODAL PREVIEW -->
    <div class="design-modal" aria-hidden="true">
        <div class="design-modal__overlay"></div>
        <div class="design-modal__content" role="dialog" aria-modal="true" aria-label="Image preview">
            <button type="button" class="design-modal__close" aria-label="Close preview">
                <i class="bx bx-x"></i>
            </button>
            <img class="design-modal__img" src="" alt="Preview">
        </div>
    </div>

    <!--===== FOOTER =====-->
    <footer class="footer">
        <div class="footer__container bd-grid">
            <div class="footer__column">
                <h2 class="footer__title">Muh. Fahril</h2>
                <p class="footer__text">Seorang mahasiswa yang hobi bermain game.</p>
                <div class="footer__social footer__social--column">
                    <a href="https://www.instagram.com/m.fahrill/" class="footer__icon"><i class='bx bxl-instagram'></i></a>
                    <a href="https://www.linkedin.com/in/muh-fahril-812b11209/" class="footer__icon"><i class='bx bxl-linkedin'></i></a>
                    <a href="https://github.com/fahril168" class="footer__icon"><i class='bx bxl-github'></i></a>
                </div>
            </div>
            <div class="footer__column">
                <h3>Video Editing</h3>
                <ul class="footer__list">
                    <li>Adobe Premiere Pro</li>
                    <li>Adobe After Effects</li>
                    <li>Capcut</li>
                    <li>DaVinci Resolve</li>
                </ul>
            </div>
            <div class="footer__column">
                <h3>Design Graphics</h3>
                <ul class="footer__list">
                    <li>Canva</li>
                    <li>Figma</li>
                </ul>
            </div>
        </div>
        <div class="footer__bottom">
            <p class="footer__copy">&copy; 2026 Muh. Fahril. All rights reserved.</p>
        </div>
    </footer>

    <script>
        /* ── SUPABASE CONFIG ── */
        /* Ambil dari localStorage (disimpan oleh admin.html) */
        const SB_URL = localStorage.getItem('fahril_sb_url') || '';
        const SB_KEY = localStorage.getItem('fahril_sb_key') || '';

        /* ── HELPERS ── */
        function esc(s) {
            if (!s) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        async function sbFetch(path) {
            const res = await fetch(SB_URL + '/rest/v1/' + path, {
                headers: {
                    'apikey': SB_KEY,
                    'Authorization': 'Bearer ' + SB_KEY,
                    'Content-Type': 'application/json'
                }
            });
            if (!res.ok) {
                const e = await res.json().catch(() => ({}));
                throw new Error(e.message || 'Request gagal (' + res.status + ')');
            }
            const txt = await res.text();
            return txt ? JSON.parse(txt) : [];
        }

        /* ── MODAL ── */
        const modal = document.querySelector('.design-modal');
        const modalImg = document.querySelector('.design-modal__img');
        const overlay = document.querySelector('.design-modal__overlay');
        const closeBtn = document.querySelector('.design-modal__close');

        function openModal(src) {
            modalImg.src = src;
            modal.classList.add('is-active');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('is-active');
            modal.setAttribute('aria-hidden', 'true');
            modalImg.src = '';
            document.body.style.overflow = '';
        }

        overlay.addEventListener('click', closeModal);
        closeBtn.addEventListener('click', closeModal);
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && modal.classList.contains('is-active')) closeModal();
        });

        /* ── RENDER ── */
        function renderDesigns(data) {
            const container = document.getElementById('design-content');

            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div style="margin-top:80px">
                        <div class="empty-state">
                            <i class='bx bx-image'></i>
                            <p>Belum ada karya design yang ditampilkan.</p>
                        </div>
                    </div>`;
                return;
            }

            /* Kelompokkan by category */
            const categories = {};
            data.forEach(item => {
                const cat = item.category || 'Lainnya';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(item);
            });

            let html = '';
            for (const [cat, items] of Object.entries(categories)) {
                html += `
                <div class="year-section visible">
                    <h2>${esc(cat)}</h2>
                    <div class="design-grid">
                        ${items.map(item => `
                        <button
                            type="button"
                            class="design-card"
                            data-preview="${esc(item.image_url || '')}"
                            data-title="${esc(item.title || '')}"
                            title="${esc(item.title || '')}"
                        >
                            <img
                                src="${esc(item.image_url || '')}"
                                alt="${esc(item.title || 'Design')}"
                                loading="lazy"
                                onerror="this.style.minHeight='120px';this.style.background='#f0f0f0'"
                            >
                        </button>`).join('')}
                    </div>
                </div>`;
            }

            container.innerHTML = html;

            /* Attach click events */
            document.querySelectorAll('.design-card').forEach(card => {
                card.addEventListener('click', () => {
                    const src = card.getAttribute('data-preview');
                    if (src) openModal(src);
                });
            });
        }

        /* ── LOAD ── */
        async function loadDesigns() {
            const container = document.getElementById('design-content');

            if (!SB_URL || !SB_KEY) {
                container.innerHTML = `
                    <div style="margin-top:80px">
                        <div class="error-state">
                            <i class='bx bx-plug'></i>
                            <p>Supabase belum dikonfigurasi.<br>
                            Silakan hubungkan Supabase melalui halaman <a href="admin.html" style="color:hsl(224,89%,60%)">Admin</a>.</p>
                        </div>
                    </div>`;
                return;
            }

            try {
                /* Fetch semua designs, urutkan by category lalu created_at */
                const data = await sbFetch('designs?select=*&order=category.asc,created_at.desc');
                renderDesigns(data);
            } catch (err) {
                container.innerHTML = `
                    <div style="margin-top:80px">
                        <div class="error-state">
                            <i class='bx bx-error-circle'></i>
                            <p>Gagal memuat data: ${esc(err.message)}</p>
                        </div>
                    </div>`;
            }
        }

        loadDesigns();
    </script>
</body>
</html>
